<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Uzum Market Demo</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:purple;
    color:white;
    padding:15px;
    font-size:24px;
    text-align:center;
}

.search{
    text-align:center;
    margin:20px;
}

.search input{
    width:300px;
    padding:10px;
}

.products{
    display:flex;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    width:150px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
}

.price{
    color:purple;
    font-weight:bold;
}
</style>

</head>

<body>

<header>Uzum Market</header>

<div class="search">
<input type="text" placeholder="Mahsulot qidirish...">
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Telefon</p>
<p class="price">2 000 000 so'm</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Naushnik</p>
<p class="price">150 000 so'm</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Soat</p>
<p class="price">300 000 so'm</p>
</div>

</div>

</body>
</html>
